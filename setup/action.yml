name: 'Setup Environment'
description: 'Node.js + Yarn setup with layered dependency caching for the FlatOut Solutions platform stack'

inputs:
  node-version:
    description: 'Node.js version'
    default: '24.x'
  convex-codegen:
    description: 'Run Convex codegen (true/false)'
    default: 'false'
  convex-deploy-key:
    description: 'Convex deploy key for codegen'
    default: ''
  convex-dir:
    description: 'Working directory for Convex codegen'
    default: '.'
  convex-generated-path:
    description: 'Path to Convex generated output (for caching)'
    default: 'convex/_generated'
  convex-source-glob:
    description: 'Glob pattern for Convex source files (for cache key)'
    default: 'convex/**/*.ts'
  convex-source-exclude-glob:
    description: 'Glob pattern to exclude from Convex source hash'
    default: 'convex/_generated/**'
  install-frontend:
    description: 'Install frontend dependencies from frontend/ (true/false)'
    default: 'false'

runs:
  using: composite
  steps:
    # ── Node.js (NO cache: yarn — we handle caching ourselves) ──
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Enable Corepack
      shell: bash
      run: corepack enable

    # ── Layer 1: Root node_modules ──
    - name: Cache root node_modules
      id: cache-root
      uses: actions/cache@v5
      with:
        path: node_modules
        key: node-modules-root-${{ runner.os }}-${{ hashFiles('yarn.lock') }}

    - name: Install root dependencies
      if: steps.cache-root.outputs.cache-hit != 'true'
      shell: bash
      run: yarn install --immutable

    # ── Layer 2: Frontend node_modules ──
    - name: Cache frontend node_modules
      if: inputs.install-frontend == 'true'
      id: cache-frontend
      uses: actions/cache@v5
      with:
        path: frontend/node_modules
        key: node-modules-frontend-${{ runner.os }}-${{ hashFiles('frontend/yarn.lock') }}

    - name: Install frontend dependencies
      if: inputs.install-frontend == 'true' && steps.cache-frontend.outputs.cache-hit != 'true'
      shell: bash
      working-directory: frontend
      run: yarn install --immutable

    # ── Layer 3: Convex codegen ──
    - name: Cache Convex codegen
      if: inputs.convex-codegen == 'true'
      id: cache-codegen
      uses: actions/cache@v5
      with:
        path: ${{ inputs.convex-generated-path }}
        key: convex-codegen-${{ runner.os }}-${{ hashFiles(inputs.convex-source-glob, format('!{0}', inputs.convex-source-exclude-glob)) }}

    - name: Convex codegen
      if: inputs.convex-codegen == 'true' && steps.cache-codegen.outputs.cache-hit != 'true'
      shell: bash
      working-directory: ${{ inputs.convex-dir }}
      env:
        CONVEX_DEPLOY_KEY: ${{ inputs.convex-deploy-key }}
      run: npx convex codegen
